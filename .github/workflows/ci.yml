name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Build-time placeholders; replace in fork if build requires real DB
          POSTGRES_URL: postgres://user:pass@localhost:5432/ci
          AUTH_SECRET: ci-build-placeholder-secret-at-least-32-chars-long
          AUTH_URL: http://localhost:3000/api/auth
